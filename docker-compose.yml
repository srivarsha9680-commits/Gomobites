services:
  db:
    image: postgres:15-alpine
    container_name: gomobites_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gomobites_pass
      POSTGRES_DB: gomobites
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gomobites_network

  backend:
    build: ./backend
    container_name: gomobites_backend
    environment:
      DATABASE_URL: postgresql://postgres:gomobites_pass@db:5432/gomobites
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      PORT: 3001
      CORS_ORIGIN: "*"
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gomobites_network
    command: npm start

  consumer_app:
    build: ./apps/consumer
    container_name: gomobites_consumer
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api/v1
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - gomobites_network
    command: npm run start

  operator_app:
    build: ./apps/operator
    container_name: gomobites_operator
    environment:
      REACT_APP_API_URL: http://backend:3001/api/v1
      REACT_APP_WS_URL: http://backend:3001
    ports:
      - "3003:3000"
    depends_on:
      - backend
    networks:
      - gomobites_network
    command: sh -c "npm run preview -- --host 0.0.0.0 --port 3000"

volumes:
  pgdata:
    driver: local

networks:
  gomobites_network:
    driver: bridge
